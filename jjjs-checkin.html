<title>中级经济师 · 打卡备考</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f0ec;color:#2c2c2c;padding:0 0 20px;min-height:100vh}
.container{max-width:500px;margin:0 auto;padding:0 14px}
h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#8b5cf6,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top{display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px}
.top h1{margin:0}.top .sub{font-size:11px;color:#999}
.btn-sm{background:none;border:1px solid #ddd;border-radius:6px;padding:4px 10px;font-size:11px;color:#999;cursor:pointer}
.btn-sm:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}

/* countdown */
.cd-bar{background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.cd-bar .cd-label{font-size:11px;color:#a5b4fc;text-transform:uppercase;letter-spacing:.5px}
.cd-bar .cd-num{font-size:32px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
.cd-bar .cd-unit{font-size:11px;color:#a5b4fc;margin-left:2px}
.cd-bar .cd-r{text-align:right}
.cd-bar .cd-sub{font-size:10px;color:#6366f1;margin-top:2px}

/* stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap: 8px;margin-bottom:12px}
.sc{background:#fff;border-radius:10px;padding:12px 8px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.06);border:1px solid #e5e7eb}
.sc .n{font-size:22px;font-weight:700;color:#8b5cf6}
.sc .l{font-size:11px;color:#999;margin-top:2px}

/* progress */
.pb{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.06);border:1px solid #e5e7eb}
.pb-h{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;color:#555}
.pb-bar{height:8px;border-radius:4px;background:#e5e7eb;overflow:hidden}
.pb-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#8b5cf6,#7c3aed);transition:width .3s}

/* today card */
.today-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #ede9fe}
.today-card .day{font-size:12px;color:#999}
.today-card .sec{font-size:15px;font-weight:600;margin-top:4px}
.today-card .sub{font-size:12px;color:#999;margin-top:2px}
.check-btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:10px}
.check-btn.pending{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff}
.check-btn.done{background:#d1fae5;color:#059669}
.check-btn.complete{background:#e5e7eb;color:#9ca3af}

/* filters */
.filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fb{padding:6px 12px;border-radius:16px;border:1px solid #e5e7eb;background:#fff;font-size:12px;cursor:pointer;transition:all .15s}
.fb.active{background:#ede9fe;border-color:#8b5cf6;color:#8b5cf6;font-weight:600}

/* week nav */
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.week-nav .wl{font-size:13px;font-weight:600;flex:1;text-align:center;color:#555}
.week-nav button{width:30px;height:30px;border-radius:15px;border:1px solid #e5e7eb;background:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* week calendar strip */
.wk-strip{display:flex;gap:4px;overflow-x:auto;padding:4px 0;margin-bottom:14px}
.wk-d{min-width:38px;text-align:center;padding:8px 4px;border-radius:8px;background:#fff;border:1px solid #e5e7eb;font-size:11px}
.wk-d.today{background:#ede9fe;border-color:#8b5cf6}
.wk-d.done{background:#d1fae5;border-color:#10b981}
.wk-d .dd{font-weight:700;font-size:15px}
.wk-d .dl{font-size:9px;color:#999;margin-top:2px}

/* section list */
.sl{display:flex;flex-direction:column;gap:6px}
.si{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:10px;border:1px solid #e5e7eb;transition:all .15s}
.si.done{border-color:#d1fae5;background:#f8fcf9}
.si .idx{width:26px;height:26px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#f3f4f6;color:#6b7280;flex-shrink:0}
.si.done .idx{background:#10b981;color:#fff}
.si .cinfo{flex:1;min-width:0}
.si .ctitle{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si .csec{font-size:11px;color:#999;margin-top:2px}
.si .csubj{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600;flex-shrink:0}
.si .经济基础{background:#ede9fe;color:#7c3aed}
.si .财政税收{background:#fce7f3;color:#be185d}
.si .复习{background:#dbeafe;color:#2563eb}
.si .休息{background:#fef3c7;color:#d97706}

/* empty */
.empty{text-align:center;padding:30px 20px;color:#999}
.empty .emoji{font-size:36px;margin-bottom:8px}

/* toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* modal */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:999;align-items:center;justify-content:center}
.mo.show{display:flex}
.mo .mc{background:#fff;border-radius:16px;padding:24px;width:85%;max-width:360px;text-align:center}
.mo h3{font-size:16px;margin-bottom:8px}
.mo p{font-size:13px;color:#666;margin-bottom:16px;line-height:1.5}
.mo .ma{display:flex;gap:8px;justify-content:center}
.mo .ma button{padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.mo .ma .cancel{background:#f3f4f6;color:#555}
.mo .ma .confirm{background:#8b5cf6;color:#fff}
.mo .ma .danger{background:#ef4444;color:#fff}
</style>
</head>

// ==================== CORE LOGIC ====================
const STORAGE_KEY = 'jjjs_checkin_v1';
const TOTAL_SECTIONS = 120;

// State
let state = {
  startDate: '2026-07-01',
  checkedIn: {},       // { "dayIndex": "ISO-date" }
  filterSubject: '全部',
  currentWeek: null,      // null = auto-calculate from today
  firstVisit: true,
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = { ...state, ...parsed };
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { toast('⚠️ 存储空间不足，请清理浏览器缓存'); }
}

// Compute sections array from CHAPTERS
function getSections() {
  const result = [];
  CHAPTERS.forEach((ch, ci) => {
    for (let i = 0; i < ch.sessions; i++) {
      result.push({
        chapterIndex: ci,
        id: result.length + 1,
        label: ch.chapter,
        sections: ch.sections,
        subject: ch.subject,
      });
    }
  });
  return result;
}

const allSections = getSections();

// Get today's date string (YYYY-MM-DD)
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// Date math helpers
function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function dateStr(date) {
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
}
function addDays(s, n) {
  const d = parseDate(s);
  d.setDate(d.getDate() + n);
  return dateStr(d);
}
function dayDiff(a, b) {
  const da = parseDate(a);
  const db = parseDate(b);
  return Math.floor((db - da) / (1000*60*60*24));
}

// Get today's day index
function todayDayIndex() {
  return dayDiff(state.startDate, todayStr());
}

// Get checked status for a day index
function isChecked(dayIndex) {
  return state.checkedIn[String(dayIndex)] || false;
}

// Check in / cancel for any day index (0-based)
function toggleCheckin(idx) {
  if (idx < 0 || idx >= TOTAL_SECTIONS) {
    toast('不在备考计划范围内');
    return;
  }
  if (isChecked(idx)) {
    // Cancel: require confirmation
    const sec = allSections[idx];
    document.getElementById('modalTitle').textContent = '取消打卡？';
    document.getElementById('modalMsg').textContent = `确定要取消「${sec.label}」的打卡记录吗？`;
    const btn = document.getElementById('modalBtn');
    btn.textContent = '确认取消';
    btn.className = 'confirm danger';
    btn.onclick = () => {
      delete state.checkedIn[String(idx)];
      saveState();
      renderAll();
      hideModal();
      toast('已取消打卡');
    };
    document.getElementById('resetModal').classList.add('show');
  } else {
    // Check in: directly
    const dateStr = addDays(state.startDate, idx);
    state.checkedIn[String(idx)] = dateStr;
    saveState();
    renderAll();
    toast('✅ 打卡成功！');
  }
}

// Check in today (via button)
function doCheckin() {
  toggleCheckin(todayDayIndex());
}

function showReset() {
  const btn = document.getElementById('modalBtn');
  if (Object.keys(state.checkedIn).length === 0) {
    toast('没有打卡记录');
    return;
  }
  document.getElementById('modalTitle').textContent = '⚠️ 确认重置';
  document.getElementById('modalMsg').textContent = '这将清空所有打卡记录，此操作不可撤销。';
  btn.textContent = '确认重置';
  btn.className = 'confirm danger';
  btn.onclick = doReset;
  document.getElementById('resetModal').classList.add('show');
}

function doReset() {
  state.checkedIn = {};
  state.firstVisit = false;
  saveState();
  renderAll();
  hideModal();
  toast('已清空全部记录');
}

function hideModal() {
  document.getElementById('resetModal').classList.remove('show');
}

function showWelcome() {
  if (!state.firstVisit) return;
  state.firstVisit = false;
  saveState();
  document.getElementById('modalTitle').textContent = '📚 欢迎！';
  document.getElementById('modalMsg').innerHTML = `
    <strong>中级经济师（财政税收）</strong><br>
    经济基础知识37章 + 财政税收实务12章<br><br>
    备考计划共 <strong>120天</strong>，每天一节。<br>
    从 <strong>2026-07-01</strong> 开始计算进度。<br><br>
    打卡后数据自动保存在浏览器中，不会丢失。
  `;
  const btn = document.getElementById('modalBtn');
  btn.textContent = '开始打卡 🚀';
  btn.className = 'confirm';
  btn.onclick = () => {
    hideModal();
  };
  document.getElementById('resetModal').classList.add('show');
}

// Toast
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('show'), 2000);
}

// Filter
function setFilter(subj) {
  state.filterSubject = subj;
  renderAll();
}

// Week navigation
function currentWeekStart() {
  if (state.currentWeek !== null) return state.currentWeek;
  const today = todayStr();
  const d = parseDate(today);
  const dayOfWeek = d.getDay();
  const diff = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  return dateStr(mon);
}
function setWeekStart(s) {
  state.currentWeek = s;
  renderAll();
}
function prevWeek() {
  setWeekStart(addDays(currentWeekStart(), -7));
}
function nextWeek() {
  setWeekStart(addDays(currentWeekStart(), 7));
}
function resetWeek() {
  state.currentWeek = null;
  renderAll();
}

function getWeekRange(monStr) {
  const mon = parseDate(monStr);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  return { mon: monStr, sun: dateStr(sun), label: `${mon.getMonth()+1}/${mon.getDate()} - ${sun.getMonth()+1}/${sun.getDate()}` };
}

// Scroll to today
function scrollToToday() {
  resetWeek();
  const el = document.getElementById('sectionList');
  const todayIdx = todayDayIndex();
  if (todayIdx >= 0 && todayIdx < TOTAL_SECTIONS) {
    const child = document.getElementById('si-' + (todayIdx + 1));
    if (child) {
      child.scrollIntoView({ behavior: 'smooth', block: 'center' });
      child.style.outline = '3px solid #8b5cf6';
      child.style.outlineOffset = '-2px';
      setTimeout(() => { child.style.outline = ''; }, 2000);
    }
  }
}

// ==================== RENDER ====================
function renderAll() {
  // Countdown to exam
  const examDate = new Date(2026, 10, 7); // Nov 7, 2026
  const now = new Date();
  const daysLeft = Math.ceil((examDate - now) / (1000*60*60*24));
  document.getElementById('cdDays').textContent = Math.max(0, daysLeft);
  document.getElementById('cdDate').textContent = daysLeft <= 0 ? '🏆 考试已到来！' : '预计 2026年11月7-8日';

  const todayIdx = todayDayIndex();
  const doneCount = Object.keys(state.checkedIn).length;
  const todayStrVal = todayStr();

  // Calculate streak
  let streak = 0;
  for (let i = todayIdx; i >= 0; i--) {
    if (isChecked(i)) streak++;
    else break;
  }

  // Stats
  document.getElementById('statDone').textContent = doneCount;
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('statTotal').textContent = TOTAL_SECTIONS;
  const pct = Math.round((doneCount / TOTAL_SECTIONS) * 100);
  document.getElementById('progressLabel').textContent = `进度 ${pct}%`;
  document.getElementById('progressCount').textContent = `${doneCount} / ${TOTAL_SECTIONS}`;
  document.getElementById('progressFill').style.width = `${pct}%`;

  // Today card
  const weekDayNames = ['日','一','二','三','四','五','六'];
  const d = new Date();
  document.getElementById('todayLabel').textContent = `${todayStrVal} 周${weekDayNames[d.getDay()]}`;

  if (todayIdx >= 0 && todayIdx < TOTAL_SECTIONS) {
    const sec = allSections[todayIdx];
    document.getElementById('todaySection').textContent = sec.label;
    document.getElementById('todaySections').textContent = sec.sections;
  } else {
    document.getElementById('todaySection').textContent = '🎉 全部完成！';
    document.getElementById('todaySections').textContent = '';
  }

  const btn = document.getElementById('checkBtn');
  if (todayIdx < 0 || todayIdx >= TOTAL_SECTIONS) {
    btn.textContent = '🏆 完成';
    btn.className = 'check-btn complete';
  } else if (isChecked(todayIdx)) {
    btn.textContent = '✅ 已打卡';
    btn.className = 'check-btn done';
  } else {
    btn.textContent = '📌 打卡';
    btn.className = 'check-btn pending';
  }

  // Filters
  const subjects = ['全部', '经济基础', '财政税收', '复习'];
  document.getElementById('filterBar').innerHTML = subjects.map(s =>
    `<span class="fb${state.filterSubject === s ? ' active' : ''}" onclick="setFilter('${s}')">${s}</span>`
  ).join('');

  // Week calendar
  const mon = currentWeekStart();
  const weekInfo = getWeekRange(mon);
  document.getElementById('weekLabel').textContent = weekInfo.label;

  let calHtml = '';
  for (let i = 0; i < 7; i++) {
    const date = addDays(mon, i);
    const idx = dayDiff(state.startDate, date);
    const dd = parseDate(date);
    const cls = date === todayStrVal ? ' today' : '';
    const doneCls = isChecked(idx) ? ' done' : '';
    calHtml += `<div class="wk-d${cls}${doneCls}" onclick="toggleCheckin(${idx})">
      <div class="dd">${dd.getDate()}</div>
      <div class="dl">周${weekDayNames[dd.getDay()]}</div>
    </div>`;
  }
  document.getElementById('weekCalendar').innerHTML = calHtml;

  // Section list
  const listEl = document.getElementById('sectionList');
  const emptyEl = document.getElementById('emptyState');
  let filtered = allSections;
  if (state.filterSubject !== '全部') {
    filtered = filtered.filter(s => s.subject === state.filterSubject);
  }
  if (filtered.length === 0) {
    emptyEl.style.display = 'block';
    listEl.innerHTML = '';
  } else {
    emptyEl.style.display = 'none';
    listEl.innerHTML = filtered.map(s => {
      const checked = isChecked(s.id - 1);
      return `<div class="si${checked ? ' done' : ''}" id="si-${s.id}" onclick="toggleCheckin(${s.id - 1})" style="cursor:pointer">
        <div class="idx">${checked ? '✓' : s.id}</div>
        <div class="cinfo">
          <div class="ctitle">${s.label}</div>
          <div class="csec">${s.sections}</div>
        </div>
        <div class="csubj ${s.subject}">${s.subject}</div>
      </div>`;
    }).join('');

    // Highlight today
    if (todayIdx >= 0 && todayIdx < TOTAL_SECTIONS) {
      const todayEl = document.getElementById('si-' + (todayIdx + 1));
      if (todayEl) {
        todayEl.style.background = '#f5f3ff';
        todayEl.style.borderColor = '#8b5cf6';
      }
    }
  }
}

// Init
loadState();
renderAll();
showWelcome();
